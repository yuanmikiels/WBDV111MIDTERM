<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshBite Prep</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f7f6;
}

.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: #2ecc71;
    color: white;
}

.navbar a {
    margin-left: 10px;
    padding: 8px 12px;
    background: white;
    color: #2ecc71;
    border-radius: 5px;
    text-decoration: none;
}

.container {
    display: flex;
}

.sidebar {
    width: 220px;
    background: white;
    padding: 20px;
    border-right: 1px solid #ddd;
}

.sidebar h3 {
    margin-top: 0;
}

.sidebar a {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    background: #ecf0f1;
    border-radius: 6px;
    text-decoration: none;
    color: black;
}

.main {
    flex: 1;
    padding: 20px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card a {
    display: block;
    margin-top: 10px;
    text-align: center;
    padding: 8px;
    background: #2ecc71;
    color: white;
    border-radius: 5px;
    text-decoration: none;
}


</style>
</head>

<body>

<div class="navbar">
    <h2>FreshBite Prep</h2>
</div>

<div class="container">

    <div class="sidebar">
        <h3>Dashboard</h3>
        <a href="index.html">Meals</a>
        <a href="billing.html">Billing</a>
        <a href="plans.html">Plans</a>
    </div>

    <div class="main">
        <h2>Select Your Meals</h2>

        <div class="cards">
            <div class="card">
                <img src="Grilled-Chicken.jpg">
                <h4>Grilled Chicken</h4>
                <p>High Protein Meal</p>
                <a href="#">Select</a>
            </div>

            <div class="card">
                <img src="Vegan-Bowl.jpg">
                <h4>Vegan Bowl</h4>
                <p>Plant-Based</p>
                <a href="#">Select</a>
            </div>

            <div class="card">
                <img src="Salmon-Bowl.jpg">
                <h4>Salmon Plate</h4>
                <p>Omega-3 Rich</p>
                <a href="#">Select</a>
            </div>
        </div>

        <div class="nutrients">
            <h3>Macro Overview</h3>
            <p>Calories: 1,200 kcal</p>
            <p>Protein: 90g</p>
            <p>Carbs: 130g</p>
            <p>Fats: 40g</p>
        </div>
    </div>

</div>

</body>
</html>
