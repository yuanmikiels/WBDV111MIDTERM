<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VibeStreamPro</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d0d0d;
    color: white;
    display: flex;
}

.sidebar {
    width: 200px;
    background: #000;
    padding: 20px;
    height: 100vh;
    box-shadow: 0 0 15px #00ffcc;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.sidebar h2 {
    color: #1db954;
    margin-bottom: 20px;
}

.nav-link {
    display: block;
    background: #181818;
    color: white;
    text-decoration: none;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    transition: 0.3s;
    font-size: 14px;
}

.nav-link:hover {
    background: #1db954;
    color: black;
    box-shadow: 0 0 10px #1db954;
    transform: translateX(5px);
}


.main {
    flex: 1;
    padding: 20px;
}

h1 {
    text-shadow: 0 0 10px #1db954;
}

.songs {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    width: 180px;
    background: #181818;
    padding: 15px;
    border-radius: 15px;
    transition: 0.3s;
    box-shadow: 0 0 10px #111;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #1db954;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card h3 {
    margin: 10px 0 5px;
}

audio {
    width: 100%;
}

.player {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #000;
    padding: 10px;
    text-align: center;
    box-shadow: 0 0 15px #1db954;
}
</style>

</head>
<body>

<div class="sidebar">
    <h2>VibeStreamPro</h2>

    <a href="index.html" class="nav-link"> Home</a>
    <a href="search.html" class="nav-link"> Search</a>
    <a href="library.html" class="nav-link"> Your Library</a>
</div>

<div class="main">
    <h1>Trending Songs</h1>

    <div class="songs">

        <div class="card">
            <img src="jayz.JPG">
            <h3>Sample Song 1</h3>
            <audio controls>
                <source src="Empire_State_Of_Mind.mp3">
            </audio>
        </div>

    </div>
</div>
</body>
</html>
