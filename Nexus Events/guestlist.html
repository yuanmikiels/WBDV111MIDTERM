<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guestlist - Nexus Events</title>
  <link rel="stylesheet" href="guestlist.css">
</head>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}

.nav {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
}

.logo {
  font-size: 1.5rem;
  font-weight: bold;
  background: linear-gradient(45deg,#ff6b6b,#ffd93d);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

nav a {
  margin-left: 20px;
  color: white;
  text-decoration: none;
}

nav .active {
  color: #ffd93d;
}

.hero {
  height: 280px;
  background: url("https://images.unsplash.com/photo-1492684223066-81342ee5ff30") center/cover no-repeat;
  margin-top: 70px;
  position: relative;
}

.overlay {
  background: rgba(0,0,0,0.6);
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.overlay h1 {
  font-size: 3rem;
}

.guestlist {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 50px 20px;
  flex-wrap: wrap;
}

.guest-card {
  background: rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(20px);
  width: 300px;
}

.guest-card h2 {
  margin-bottom: 15px;
}

.benefits {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.benefit {
  background: rgba(255,255,255,0.2);
  padding: 10px;
  border-radius: 10px;
}

form {
  display: flex;
  flex-direction: column;
}

form input, form select {
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

form button {
  padding: 12px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg,#ff6b6b,#ff8e8e);
  color: white;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 20px;
  background: rgba(0,0,0,0.5);
}

@media (max-width: 768px) {
  .nav {
    flex-direction: column;
    align-items: center;
  }

  .overlay h1 {
    font-size: 2rem;
  }
}
</style>
<body>


<header class="nav">
  <h2 class="logo">Nexus Events</h2>
  <nav>
    <a href="nexusevents.html" class="nav-btn active" onclick="showSection('events')">Events</a>
            <a href="tickets-venue-guestlist.html" class="nav-btn active" onclick="showSection('tickets')">Tickets</a>
            <a href="venue.html" class="nav-btn" onclick="showSection('venue')">Venue</a>
            <a href="guestlist.html" class="nav-btn" id="availabilityBtn" onclick="toggleAvailability('guestlist')">Guestlist</a>
  </nav>
</header>


<section class="hero">
  <div class="overlay">
    <h1>VIP Guestlist</h1>
    <p>Skip the line. Enter like a VIP.</p>
  </div>
</section>

<section class="guestlist">

  <div class="guest-card">
    <h2>Why Join?</h2>

    <div class="benefits">
      <div class="benefit">✓ Early Access (8:30PM)</div>
      <div class="benefit">✓ Free Welcome Drink</div>
      <div class="benefit">✓ Priority Entry</div>
      <div class="benefit">✓ Exclusive Discounts</div>
    </div>
  </div>

  <div class="guest-card form-card">
    <h2>Join the Guestlist</h2>

    <form>
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="tel" placeholder="Phone Number" required>

      <select required>
        <option value="">Select Event</option>
        <option>Neon Nights</option>
        <option>Deep House Vibes</option>
        <option>Techno Revolution</option>
      </select>

      <button type="submit">Join Now →</button>
    </form>

  </div>

</section>

<footer>
  <p>© 2026 Nexus Events. All rights reserved.</p>
</footer>

</body>
</html>
