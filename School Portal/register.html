<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - ScholarPortal</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: #f4f1ea;
    color: #2c2c2c;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #2c3e50;
    color: white;
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

.nav-links a {
    margin: 0 10px;
    text-decoration: none;
    background: #f0e6d2;
    color: #2c2c2c;
    padding: 10px 15px;
    border-radius: 5px;
    border-left: 5px solid #8b5e3c;
}

.main {
    padding: 30px;
}

.section {
    background: #fffdf7;
    padding: 20px;
    border-left: 8px solid #8b5e3c;
    border-radius: 10px;
    margin-bottom: 20px;
}

.table {
    width: 100%;
    border-collapse: collapse;
}

.table th, .table td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.table th {
    text-align: left;
}

.total {
    text-align: right;
    font-size: 18px;
    margin-top: 10px;
}

.btn {
    margin-top: 15px;
    padding: 10px;
    background: #2c3e50;
    color: white;
    border: none;
    width: 100%;
    cursor: pointer;
}

.transcript {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #2c3e50;
    color: white;
    padding: 12px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">ScholarPortal</div>

    <div class="nav-links">
        <a href="index.html">Courses</a>
        <a href="register.html">Register</a>
        <a href="profile.html">Profile</a>
    </div>
</div>

<div class="main">

    <h1>Semester Registration</h1>

    <div class="section">
        <h2>Selected Courses</h2>

        <table class="table">
            <tr>
                <th>Course</th>
                <th>Units</th>
                <th>Fee</th>
            </tr>

            <tr>
                <td>Web Development</td>
                <td>3</td>
                <td>$150</td>
            </tr>

            <tr>
                <td>Database Systems</td>
                <td>3</td>
                <td>$150</td>
            </tr>

            <tr>
                <td>Programming 1</td>
                <td>4</td>
                <td>$200</td>
            </tr>
        </table>

        <div class="total">
            <strong>Total: $500</strong>
        </div>
    </div>

    <div class="section">
        <h2>Payment</h2>
        <p>Select your payment method and confirm registration.</p>

        <button class="btn">💳 Pay & Register</button>
    </div>

</div>
</body>
</html>
