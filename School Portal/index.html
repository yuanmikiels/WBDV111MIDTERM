<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ScholarPortal</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: #f4f1ea;
    color: #2c2c2c;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #2c3e50;
    color: white;
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

.nav-links a {
    margin: 0 10px;
    text-decoration: none;
    background: #f0e6d2;
    color: #2c2c2c;
    padding: 10px 15px;
    border-radius: 5px;
    border-left: 5px solid #8b5e3c; /* notebook tab */
    transition: 0.3s;
}

.nav-links a:hover {
    background: #e0d3b8;
}

.main {
    padding: 30px;
}

.modules {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.module {
    width: 220px;
    background: #fffdf7;
    padding: 15px;
    border-radius: 10px;
    border-left: 8px solid #8b5e3c;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.module:hover {
    transform: translateY(-5px);
}

.module h3 {
    margin: 0 0 10px;
}

.module p {
    font-size: 14px;
}

.btn {
    margin-top: 10px;
    padding: 8px;
    border: none;
    background: #2c3e50;
    color: white;
    cursor: pointer;
    width: 100%;
}

.transcript {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #2c3e50;
    color: white;
    padding: 12px;
    border-radius: 8px;
}

.login {
    display: flex;
    height: 100vh;
}

.login-left {
    flex: 1;
    background: #2c3e50;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
}

.login-right {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.form {
    width: 280px;
}

.form input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
}

.form button {
    width: 100%;
    padding: 10px;
    background: #2c3e50;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">ScholarPortal</div>

    <div class="nav-links">
        <a href="schoolportal.html">Courses</a>
        <a href="register.html">Register</a>
        <a href="profile.html">Profile</a>
    </div>
</div>

<div class="main">

    <h1>Course Catalog</h1>

    <div class="modules">

        <div class="module">
            <h3>Web Development</h3>
            <p>Learn HTML, CSS, and JavaScript basics.</p>
            <button class="btn">Add to Semester</button>
        </div>

        <div class="module">
            <h3>Database Systems</h3>
            <p>Introduction to SQL and data modeling.</p>
            <button class="btn">Add to Semester</button>
        </div>

        <div class="module">
            <h3>Programming 1</h3>
            <p>Fundamentals of C++ programming.</p>
            <button class="btn">Add to Semester</button>
        </div>

    </div>

</div>
</body>
</html>
