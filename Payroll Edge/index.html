<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PayRoll Edge</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a192f; /* Navy theme */
    color: white;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #020c1b;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    color: #64ffda;
}

.nav-links a {
    margin: 0 10px;
    text-decoration: none;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    transition: 0.3s;
}

.nav-links a:hover {
    background: #64ffda;
    color: black;
}

.container {
    padding: 20px;
}

.bento {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.box {
    background: #112240;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 10px #000;
}

.box h3 {
    margin-bottom: 10px;
    color: #64ffda;
}

.table {
    width: 100%;
    margin-top: 30px;
    border-collapse: collapse;
    background: #112240;
    border-radius: 10px;
    overflow: hidden;
}

.table th, .table td {
    padding: 12px;
    border-bottom: 1px solid #1c2e4a;
}

.table th {
    background: #020c1b;
}

.btn {
    padding: 6px 10px;
    border: none;
    background: #64ffda;
    color: black;
    cursor: pointer;
    border-radius: 5px;
}

.tax-view {
    position: fixed;
    bottom: 15px;
    right: 15px;
    background: #64ffda;
    color: black;
    padding: 10px 15px;
    border-radius: 10px;
    font-weight: bold;
}

.login {
    display: flex;
    height: 100vh;
}

.login-left {
    flex: 1;
    background: #020c1b;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 50px;
}

.login-right {
    flex: 1;
    background: white;
    color: black;
    display: flex;
    justify-content: center;
    align-items: center;
}

.form {
    width: 280px;
}

.form input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
}

.form button {
    width: 100%;
    padding: 10px;
    background: #0a192f;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">PayRoll Edge</div>
    <div class="nav-links">
       <a href="index.html">Staff</a>
       <a href="timesheets.html">Timesheets</a>
       <a href="payslips.html">Payslips</a>
    </div>
</div>

<div class="container">

    <h2>Dashboard</h2>

    <div class="bento">

        <div class="box">
            <h3>Next Payday</h3>
            <p>April 30, 2026</p>
        </div>

        <div class="box">
            <h3>Total Hours</h3>
            <p>160 hrs</p>
        </div>

        <div class="box">
            <h3>Tax</h3>
            <p>$1,200</p>
        </div>

    </div>

    <table class="table">
        <tr>
            <th>Employee</th>
            <th>Hours</th>
            <th>Tax</th>
        </tr>

        <tr>
            <td>John Doe</td>
            <td>40</td>
            <td>$300</td>
        </tr>

        <tr>
            <td>Jane Smith</td>
            <td>35</td>
            <td>$250</td>
        </tr>

    </table>

</div>
</body>
</html>
