<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timesheets - PayRoll Edge</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a192f;
    color: white;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #020c1b;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    color: #64ffda;
}

.nav-links a {
    margin: 0 10px;
    text-decoration: none;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
}

.nav-links a:hover {
    background: #64ffda;
    color: black;
}

.container {
    padding: 20px;
}

.table {
    width: 100%;
    border-collapse: collapse;
    background: #112240;
    border-radius: 10px;
    overflow: hidden;
}

.table th, .table td {
    padding: 12px;
    border-bottom: 1px solid #1c2e4a;
    text-align: center;
}

.table th {
    background: #020c1b;
}

input {
    width: 80px;
    padding: 5px;
    border: none;
    text-align: center;
}

.btn {
    padding: 6px 10px;
    border: none;
    background: #64ffda;
    color: black;
    cursor: pointer;
    border-radius: 5px;
}

.add-btn {
    margin-top: 15px;
    padding: 10px;
    background: #64ffda;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.tax-view {
    position: fixed;
    bottom: 15px;
    right: 15px;
    background: #64ffda;
    color: black;
    padding: 10px 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">PayRoll Edge</div>
    <div class="nav-links">
       <a href="index.html">Staff</a>
       <a href="timesheets.html">Timesheets</a>
       <a href="payslips.html">Payslips</a>
    </div>
</div>

<div class="container">

    <h2>Timesheets</h2>

    <table class="table">
        <tr>
            <th>Employee</th>
            <th>Date</th>
            <th>Hours</th>
            <th>Rate</th>
            <th>Total</th>
            <th>Action</th>
        </tr>

        <tr>
            <td>John Doe</td>
            <td><input type="date"></td>
            <td><input type="number" value="8"></td>
            <td><input type="number" value="10"></td>
            <td>$80</td>
            <td><button class="btn">Save</button></td>
        </tr>

        <tr>
            <td>Jane Smith</td>
            <td><input type="date"></td>
            <td><input type="number" value="6"></td>
            <td><input type="number" value="12"></td>
            <td>$72</td>
            <td><button class="btn">Save</button></td>
        </tr>

    </table>

    <button class="add-btn">+ Add Entry</button>

</div>
</body>
</html>
