<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payslips - PayRoll Edge</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a192f;
    color: white;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #020c1b;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    color: #64ffda;
}

.nav-links a {
    margin: 0 10px;
    text-decoration: none;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
}

.nav-links a:hover {
    background: #64ffda;
    color: black;
}

.container {
    padding: 20px;
}

/* PAYSLIP CARD */
.payslip {
    max-width: 600px;
    margin: auto;
    background: #112240;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 10px #000;
}

.payslip h2 {
    text-align: center;
    color: #64ffda;
}

.row {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
}

.section {
    margin-top: 20px;
    padding-top: 10px;
    border-top: 1px solid #1c2e4a;
}

.net {
    font-size: 20px;
    font-weight: bold;
    color: #64ffda;
}

.btn {
    margin-top: 20px;
    width: 100%;
    padding: 10px;
    border: none;
    background: #64ffda;
    color: black;
    cursor: pointer;
    border-radius: 5px;
}

.tax-view {
    position: fixed;
    bottom: 15px;
    right: 15px;
    background: #64ffda;
    color: black;
    padding: 10px 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">PayRoll Edge</div>
    <div class="nav-links">
       <a href="payrolledge.html">Staff</a>
       <a href="timesheets.html">Timesheets</a>
       <a href="payslips.html">Payslips</a>
    </div>
</div>

<div class="container">

    <div class="payslip">
        <h2>Payslip</h2>

        <div class="row">
            <span>Employee:</span>
            <span>John Doe</span>
        </div>

        <div class="row">
            <span>Period:</span>
            <span>April 1 - April 15</span>
        </div>

        <div class="section">
            <h3>Earnings</h3>
            <div class="row">
                <span>Hours Worked:</span>
                <span>80 hrs</span>
            </div>
            <div class="row">
                <span>Rate:</span>
                <span>$10/hr</span>
            </div>
            <div class="row">
                <span>Total Earnings:</span>
                <span>$800</span>
            </div>
        </div>

        <div class="section">
            <h3>Deductions</h3>
            <div class="row">
                <span>Tax:</span>
                <span>$120</span>
            </div>
        </div>

        <div class="section">
            <div class="row net">
                <span>Net Pay:</span>
                <span>$680</span>
            </div>
        </div>

        <button class="btn">⬇ Export Payslip</button>
    </div>

</div>
</body>
</html>
