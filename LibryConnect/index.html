<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LibryConnect</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: #f5f1e6;
    color: #2c2c2c;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #3e2f1c;
    color: #f5f1e6;
}

.logo {
    font-size: 22px;
    font-weight: bold;
}

.nav-links a {
    margin: 0 10px;
    text-decoration: none;
    background: #e6d3a3;
    color: #2c2c2c;
    padding: 10px 15px;
    border-radius: 5px;
    border: 2px dashed #b89b5e;
    font-family: 'Courier New', monospace;
    transition: 0.3s;
}

.nav-links a:hover {
    background: #d4b56a;
}

.main {
    text-align: center;
    padding: 50px 20px;
}

.search-box {
    margin: 40px auto;
    width: 60%;
}

.search-box input {
    width: 80%;
    padding: 15px;
    font-size: 18px;
    border: 2px solid #b89b5e;
    border-radius: 5px;
}

.search-box button {
    padding: 15px;
    font-size: 16px;
    border: none;
    background: #3e2f1c;
    color: #f5f1e6;
    cursor: pointer;
}

.results {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.book {
    width: 60%;
    background: #fffaf0;
    border: 1px solid #d6c7a1;
    padding: 15px;
    text-align: left;
    border-radius: 5px;
}

.book h3 {
    margin: 0;
}

.status {
    font-size: 14px;
    margin-top: 5px;
}

.btn {
    margin-top: 10px;
    padding: 8px 12px;
    background: #3e2f1c;
    color: #fff;
    border: none;
    cursor: pointer;
}

.overdue {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #8b0000;
    color: white;
    padding: 12px 15px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">LibryConnect</div>

    <div class="nav-links">
        <a href="libryconnect.html">Search</a>
        <a href="members.html">Members</a>
        <a href="#">Loans</a>
    </div>
</div>

<div class="main">

    <h1>Find Your Next Book</h1>

    <div class="search-box">
        <input type="text" placeholder="Search books, authors...">
        <button>Search</button>
    </div>

    <div class="results">

        <div class="book">
            <h3>The Great Gatsby</h3>
            <p>by F. Scott Fitzgerald</p>
            <div class="status">Status: Available</div>
            <button class="btn">Place Hold</button>
        </div>

        <div class="book">
            <h3>1984</h3>
            <p>by George Orwell</p>
            <div class="status">Status: On Loan (Due: May 10)</div>
            <button class="btn">Track Due Date</button>
        </div>

    </div>

</div>
</body>
</html>
