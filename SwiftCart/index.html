<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftCart</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f6fa;
}

.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    background: #2c3e50;
    color: white;
}

.navbar a {
    margin-left: 10px;
    padding: 8px 12px;
    background: white;
    color: #2c3e50;
    text-decoration: none;
    border-radius: 5px;
}

.container {
    display: flex;
}

.sidebar {
    width: 200px;
    background: white;
    padding: 20px;
    border-right: 1px solid #ddd;
}

.sidebar a {
    display: block;
    margin: 10px 0;
    padding: 10px;
    background: #ecf0f1;
    text-decoration: none;
    color: black;
    border-radius: 6px;
}

.products {
    flex: 1;
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 8px;
}

.card a {
    display: block;
    margin-top: 10px;
    padding: 8px;
    background: #3498db;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

.cart {
    width: 260px;
    background: white;
    padding: 20px;
    border-left: 1px solid #ddd;
}

.cart h3 {
    margin-top: 0;
}

.cart-item {
    margin: 10px 0;
    border-bottom: 1px solid #eee;
    padding-bottom: 8px;
}

.checkout {
    display: block;
    margin-top: 15px;
    padding: 10px;
    background: #27ae60;
    color: white;
    text-align: center;
    text-decoration: none;
    border-radius: 6px;
}

.status {
    margin-top: 20px;
    background: #ecf0f1;
    padding: 10px;
    border-radius: 6px;
}

.drawer {
    position: fixed;
    right: -100%;
    top: 0;
    width: 100%;
    height: 100%;
    display: flex;
    transition: 0.4s;
}

.drawer.open {
    right: 0;
}

.left-img {
    width: 50%;
    background: url('https://via.placeholder.com/600x800') center/cover;
}

.login {
    width: 50%;
    background: white;
    padding: 40px;
}

.login input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

.login a {
    display: block;
    padding: 10px;
    background: #2c3e50;
    color: white;
    text-align: center;
    text-decoration: none;
}

.open-btn {
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>SwiftCart</h2>
</div>

<div class="container">

    <div class="sidebar">
        <a href="index.html">Catalog</a>
        <a href="cart.html">Cart</a>
        <a href="checkout.html">Checkout</a>
    </div>

    <div class="products">
        <h2>Browse Store</h2>

        <div class="grid">
            <div class="card">
                <img src="Grilled-Chicken.jpg">
                <h4>Chicken Meal</h4>
                <p>$10</p>
                <a href="#">Add to Cart</a>
            </div>

            <div class="card">
                <img src="Vegan-Bowl.jpg">
                <h4>Vegan Bowl</h4>
                <p>$12</p>
                <a href="#">Add to Cart</a>
            </div>

            <div class="card">
                <img src="Salmon-Bowl.jpg">
                <h4>Salmon Pack</h4>
                <p>$15</p>
                <a href="#">Add to Cart</a>
            </div>
        </div>
    </div>

    <div class="cart">
        <h3>Your Cart</h3>

        <div class="cart-item">Chicken Meal - $10</div>
        <div class="cart-item">Vegan Bowl - $12</div>

        <strong>Total: $22</strong>

        <a href="#" class="checkout">Proceed to Checkout</a>

        <div class="status">
            <strong>Status:</strong> Preparing Order
        </div>
    </div>

</div>
</div>
</body>
</html>
