<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Luna Vista Resort Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #dfe7c5;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  display: flex;
  width: 900px;
  height: 520px;
  background: #fff;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.left {
  width: 50%;
  padding: 40px;
}

.logo {
  background: black;
  color: white;
  padding: 5px 10px;
  border-radius: 10px;
  font-size: 12px;
  margin-bottom: 20px;
}

.left h1 {
  color: #3a5f2c;
}

.left p {
  font-size: 13px;
  margin: 15px 0;
}

.tabs {
  display: flex;
}

.tabs button {
  flex: 1;
  padding: 8px;
  border: none;
}

.tabs .active {
  background: #c7db32;
}

.tabs .inactive {
  background: #eee;
}

form input {
  width: 100%;
  border: none;
  border-bottom: 2px solid #ccc;
  padding: 8px;
  margin-bottom: 10px;
}

.password-box {
  display: flex;
}

.login-btn {
  margin-top: 15px;
  padding: 10px;
  border: none;
  background: #c7db32;
  border-radius: 20px;
}

.right {
  width: 50%;
  position: relative;
  overflow: hidden;
}

.nav {
  position: absolute;
  top: 20px;
  right: 20px;
  z-index: 2;
}

.nav a {
  margin-left: 15px;
  color: white;
  text-decoration: none;
}

.hotel-logo {
  position: absolute;
  top: 20px;
  left: 20px;
  color: #c7db32;
  z-index: 2;
}

.slider {
  width: 100%;
  height: 100%;
}

.slides {
  display: flex;
  width: 300%;
  height: 100%;
  transition: 0.6s;
}

.slide {
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
}

.dots {
  position: absolute;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
}

.dots span {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: white;
  margin: 4px;
  border-radius: 50%;
  opacity: 0.5;
  cursor: pointer;
}

.dots .active {
  opacity: 1;
}
}
</style>
<body>

<div class="container">
  
  <div class="left">
    <div class="logo">WiFi</div>

    <h1>Welcome to<br>Luna Vista Resort</h1>
    <p>Enjoy your stay with us in the best budget hotel chain by Swiss-Belhotel.</p>

    <div class="tabs">
      <button class="inactive">Member</button>
      <button class="active">Voucher</button>
    </div>

    <small>Please login based on your account’s type</small>

    <form>
      <label>Username</label>
      <input type="text" placeholder="Write down username">

      <label>Password</label>
      <div class="password-box">
        <input type="password" placeholder="Write given password">
      </div>

      <button class="login-btn">Login →</button>
    </form>
  </div>

  <div class="right">

    <div class="nav">
    <a href="index.html">Login</a>
    <a href="package.html">Package</a>
    <a href="contact.html">Contact</a>
    <a href="about.html">About</a>
    </div>

    <div class="hotel-logo">Luna Vista<br><span>Resort</span></div>

    <div class="slider">
      <div class="slides">
		<img src="rama-beach-resort-and.jpg" div class="slide">
		<img src="swimming-pool.jpg" div class="slide">
		<img src="suite-pool-villa.jpg" div class="slide">
      </div>
    </div>

    <div class="dots">
      <span class="active" onclick="setSlide(0)"></span>
      <span onclick="setSlide(1)"></span>
      <span onclick="setSlide(2)"></span>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
